# Basic
set -g default-shell /bin/zsh
set -g default-terminal screen-256color
set -g escape-time 10
set -g history-limit 100000
set -g mouse on
set -g prefix C-s
set -g status-right "%H:%M"
unbind C-b

# Vim-like
bind + resize-pane -U 20
bind - resize-pane -D 20
bind < resize-pane -L 20
bind > resize-pane -R 20
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
set-window-option -g mode-keys vi

# Popup
bind -r e run-shell '\
  SESSION="shell-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
if-shell "uname -a | grep Linux | grep -E '(M|m)icrosoft'" \
  "set -s copy-command 'iconv -t utf16 | clip.exe'"

